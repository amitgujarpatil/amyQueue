site_name: AmyQueue
site_description: A distributed message queue built from scratch — Amit's Kafka
site_url: https://amitgujarpatil.github.io/amyQueue
repo_url: https://github.com/amitgujarpatil/amyQueue
repo_name: amitgujarpatil/amyQueue

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/message-fast
  features:
    - navigation.tabs           # top-level sections as tabs
    - navigation.tabs.sticky
    - navigation.sections       # expand sections in sidebar
    - navigation.expand
    - navigation.top            # back to top button
    - navigation.indexes        # section index pages
    - search.highlight
    - search.suggest
    - content.code.copy         # copy button on code blocks
    - content.code.annotate

markdown_extensions:
  - admonition                  # note/warning/tip callout boxes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Running Controllers: getting-started/running-controllers.md
    - Configuration Reference: getting-started/configuration.md
  - Architecture:
    - architecture/index.md
    - Overview: architecture/overview.md
    - Raft Consensus: architecture/raft.md
    - Transport Layer: architecture/transport.md
    - Cluster Membership: architecture/membership.md
    - Metrics Design: architecture/metrics.md
  - Operations:
    - operations/index.md
    - Static Cluster: operations/static-cluster.md
    - Dynamic Cluster: operations/dynamic-cluster.md
    - Admin API: operations/admin-api.md
    - Metrics: operations/metrics.md
  - Internals:
    - internals/index.md
    - System Flows: internals/flows.md
    - Problems & Solutions: internals/problems-and-solutions.md
    - Design Discussions: internals/discussions.md
    - Raft Dynamic Membership: internals/raft-dynamic-membership.md
    - Q&A: internals/qna.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amitgujarpatil
